<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Admin Dashboard</title>
</head>
<body>
    <div class="dashboard-container">
            <aside class="sidebar">
                <div class="brand">
                    <img src="images/view-dashboard.svg" alt="dashboard icon">
                    <span>Dashboard</span>
                </div>
                <nav class="nav-main">
                    <ul>
                        <li><a href="#"><img src="images/home.svg" alt="home icon">Home</a></li>
                        <li><a href="#"><img src="images/user-folder-svgrepo-com.svg" alt="profile icon">Profile</a></li>
                        <li><a href="#"><img src="images/message-reply.svg" alt="message reply icon">Message</a></li>
                        <li><a href="#"><img src="images/clock-time-nine-outline.svg" alt="history icon">History</a></li>
                        <li><a href="#"><img src="images/note-multiple.svg" alt="task icon">Task</a></li>
                        <li><a href="#"><img src="images/group-users_4122832.png" alt="community icon">Community</a></li>
                    </ul>
                </nav>
                <nav class="nav-secondary">
                    <ul>
                        <li><a href="#"><img src="images/settings.svg" alt="settings icon">Settings</a></li>
                        <li><a href="#"><img src="images/security_18264768.png" alt="support icon">Support</a></li>
                        <li><a href="#"><img src="images/tecnical_17474369.png" alt="privacy icon">Privacy</a></li>
                    </ul>
                </nav>
            </aside>
    
        <div class="main-area">
             
            <header class="header"></header>
            <main class="content"></main>
        </div>
       
    </div>
    
</body>
</html>
