<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Admin Dashboard</title>
</head>
<body>
    <div class="dashboard-container">
            <aside class="sidebar">
                <div class="brand">
                    <img src="images/view-dashboard.svg" height="30" width="30" alt="dashboard icon">
                    <span>Dashboard</span>
                </div>
                <nav class="nav-main">
                    <ul>
                        <li><a href="#"><img src="images/home.svg" height="20" width="20" alt="home icon">Home</a></li>
                        <li><a href="#"><img src="images/user-folder-svgrepo-com.svg" height="20" width="20" alt="profile icon">Profile</a></li>
                        <li><a href="#"><img src="images/message-reply.svg" height="20" width="20" alt="message reply icon">Message</a></li>
                        <li><a href="#"><img src="images/clock-time-nine-outline.svg" height="20" width="20" alt="history icon">History</a></li>
                        <li><a href="#"><img src="images/note-multiple.svg" height="20" width="20" alt="task icon">Task</a></li>
                        <li><a href="#"><img src="images/group-users_4122832.png" height="20" width="20" alt="community icon">Community</a></li>
                    </ul>
                </nav>
                <nav class="nav-secondary">
                    <ul>
                        <li><a href="#"><img src="images/settings.svg" height="20" width="20" alt="settings icon">Settings</a></li>
                        <li><a href="#"><img src="images/security_18264768.png" height="20" width="20" alt="support icon">Support</a></li>
                        <li><a href="#"><img src="images/tecnical_17474369.png" height="20" width="20" alt="privacy icon">Privacy</a></li>
                    </ul>
                </nav>
            </aside>
    
        <div class="main-area">
             
            <header class="header">
                <div class="top-header">
                    <div class="searchbar">
                        <img class="img" src="images/magnify.svg" height="20" width="20" alt="search bar icon"/>
                        <input class="search" type="text">
                    </div>
                    <div class="user-notification" >
                        <img class="" src="images/bell-ring.svg" height="20" width="20" alt="notification icon"/>
                        <img class="user-image" src="images/user.jpg" height="30" width="30" alt="user avatar icon"/>
                        <span class="user-name">Morgan Oakley</span>
                    </div>
                </div>
                <div class="bottom-header">
                    <div class="user">
                       <img class="user-image" src="images/user.jpg" height="60" width="60" alt="user avatar icon"/>
                        <div class="">
                            <h2>Welcome Back, Morgan!</h2>
                            <p>Here's what's happening with your projects today.</p>
                        </div>
                    </div>
                    <div class="user-button">
                        <button>New</button>
                        <button>Upload</button>
                        <button>Share</button>
                     </div>
                </div>
            </header>
            <main class="content"></main>
        </div>
       
    </div>
    
</body>
</html>
